    .star {
    position: fixed;
    pointer-events: none;
    color: gold;
    font-size: 16px;
    animation: sparkle 0.4s linear forwards;
    text-shadow: 0 0 8px gold;
}


@keyframes sparkle {
    0% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1) rotate(0deg);
    }
    100% {
        opacity: 0;
        transform: translate(-50%, -10px) scale(0) rotate(180deg);
    }
}

    <!-- ChatGPT written star cursor code :( -->
<script>
document.addEventListener("mousemove", (e) => {
    const star = document.createElement("div");
    star.className = "star";
    star.textContent = "★";

    star.style.left = e.clientX + "px";
    star.style.top = e.clientY + "px";

    // Random size
    star.style.fontSize = (10 + Math.random() * 15) + "px";

    // Random color
    const colors = ["gold", "white", "#ff69b4", "#87cefa", "#ffff66"];
    star.style.color = colors[Math.floor(Math.random() * colors.length)];

    document.body.appendChild(star);

    setTimeout(() => {
        star.remove();
    }, 800);
});
</script>
